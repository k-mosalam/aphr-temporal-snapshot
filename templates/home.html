<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
  {{ topbar }}
  {{ content_drawer }}
  <div class="site-shell">
    <main class="site-main">
      {{ brand_strip }}

      <header class="site-header" id="overview">
        <h1 class="site-title">APHR Events</h1>
        <p class="site-subtitle">Preliminary post-hazard reconnaissance briefings, organized by event and snapshot time for rapid situational awareness and expert review.</p>
      </header>

      <section class="timeline-section" id="events" aria-label="APHR event timeline">
        <div class="timeline-list event-timeline">
        {{ event_timeline }}
        </div>
      </section>

      <footer class="site-footer" id="site-footer">
        Khalid M. Mosalam and Guanren Zhou · University of California, Berkeley
      </footer>
    </main>
  </div>
  <script src="assets/js/site.js"></script>
</body>
</html>
