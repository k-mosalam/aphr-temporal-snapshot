<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="../../assets/css/site.css">
</head>
<body>
  {{ topbar }}
  {{ content_drawer }}
  <div class="site-shell">
    <main class="site-main">
      {{ brand_strip }}

      <header class="site-header" id="event-overview">
        <h1 class="site-title">{{ event_title }}</h1>
        <p class="site-subtitle">{{ event_description }}</p>
      </header>

      {{ temporal_feature }}

      <section class="timeline-section" id="snapshots" aria-label="Snapshot timeline">
        <div class="section-heading">
          <h2>Snapshot timeline</h2>
        </div>
        <div class="timeline-list product-timeline">
        {{ product_timeline }}
        </div>
      </section>

      <footer class="site-footer">
        Khalid M. Mosalam and Guanren Zhou · University of California, Berkeley
      </footer>
    </main>
  </div>
  <script src="../../assets/js/site.js"></script>
</body>
</html>
